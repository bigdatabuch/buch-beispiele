version: "2.2"
services:
  jobmanager:
    image: flink:2.1.0-scala_2.12
    container_name: flink-jobmanager
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
    volumes:
      - ./target:/opt/flink/usrlib

  taskmanager:
    image: flink:2.1.0-scala_2.12
    container_name: flink-taskmanager
    depends_on: [jobmanager]
    command: taskmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 2
    volumes:
      - ./target:/opt/flink/usrlib

  textsource:
    image: alpine:3.20
    container_name: textsource
    stdin_open: true
    tty: true
    command: /bin/sh -c "apk add --no-cache netcat-openbsd >/dev/null && nc -lk -p 9000"
