services:
  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_CLI_CONFIG_NAME=myConf
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=testtest
      - DOCKER_INFLUXDB_INIT_ORG=air_quality_org
      - DOCKER_INFLUXDB_INIT_BUCKET=air_quality
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=my-secret-token1
    restart: unless-stopped

volumes:
  influxdb-data:
